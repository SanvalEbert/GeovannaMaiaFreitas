<!doctype html>

  <body class="bg-floral-gradient">
    <!-- Container posicionado relativamente para servir de referência -->
    <div class="relative">

      <!-- Foto posicionada absoluta sobre o header -->
      <img
        src="assets/geovanna-photo-PM0WacmB.png"
        alt="Foto de Geovanna Maia Freitas"
        class="
          absolute 
          top-8    <!-- Ajuste aqui o deslocamento vertical (top-?) -->

          rounded-full 
          shadow-lg

        id="root"
        class="
          pt-24   <!-- Ajuste aqui o padding-top (pt-?) para empurrar o conteúdo para baixo -->
