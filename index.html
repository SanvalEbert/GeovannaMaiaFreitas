<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geovanna Maia Freitas – Portfólio</title>

    <!-- Tailwind gerado -->
    <link rel="stylesheet" href="assets/index-BFHoZfbG.css" />
    <script type="module" src="assets/index-TzugY8mr.js"></script>
  </head>

  <body class="bg-floral-gradient">
    <!-- Container posicionado relativamente para servir de referência -->
    <div class="relative">

      <!-- 
        FOTO: ajuste aqui top e left para posicionamento absoluto 
        - top-8  => mexe na posição vertical (aumente para descer, diminua para subir)
        - left-8 => mexe na posição horizontal (aumente para deslocar à direita, diminua para a esquerda)
      -->
      <img
        src="assets/geovanna-photo-PM0WacmB.png"
        alt="Foto de Geovanna Maia Freitas"
        class="
          absolute 
          top-16    <!-- ajuste vertical aqui ☝️ -->
          left-16   <!-- ajuste horizontal aqui ☝️ -->
          w-48 h-48 
          rounded-full 
          shadow-lg 
          z-20
        "
      />

      <!-- 
        ROOT: adiciona espaçamento para o React não sobrepor a foto
        - pt-24 => padding-top (aumente para empurrar mais pra baixo)
        - pl-64 => padding-left (aumente para empurrar mais para a direita)
      -->
      <div
        id="root"
        class="
          pt-24   <!-- ajuste padding-top aqui ☝️ -->
          pl-64   <!-- ajuste padding-left aqui ☝️ -->
        "
      ></div>
    </div>
  </body>
</html>
